<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Imposters - NCC Staff Band</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
        }
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #004a99; /* NCC blue-ish tint */
            margin-bottom: 30px;
        }
        h1 { margin-bottom: 5px; color: #004a99; }
        .links-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-youtube { background-color: #ff0000; color: white; }
        .btn-onsong { background-color: #1d1d1f; color: white; }
        
        .song-list {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        tr:hover { background-color: #f9f9f9; }
        .chart-links a {
            margin-right: 10px;
            font-size: 0.9em;
            color: #004a99;
        }
    </style>
</head>
<body>

<header>
    <h1>The Imposters</h1>
    <p>Northampton Community College Staff Band - Setlist & Charts</p>
</header>

<div class="links-bar">
    <a href="INSERT_YOUTUBE_PLAYLIST_URL" target="_blank" class="btn btn-youtube">📺 YouTube Playlist</a>
    <a href="https://apps.apple.com/us/app/onsong/id502344938" target="_blank" class="btn btn-onsong">📱 Get OnSong (iOS)</a>
</div>

<div class="song-list">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Song Title</th>
                <th>Charts</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td><strong>Example Song Title</strong></td>
                <td class="chart-links">
                    <a href="DROPBOX_PDF_LINK" target="_blank">PDF Chart</a> | 
                    <a href="DROPBOX_ONSONG_LINK">OnSong Format</a>
                </td>
            </tr>
            <tr><td>2</td><td><strong>Song Title 2</strong></td><td class="chart-links"><a href="#">PDF</a> | <a href="#">OnSong</a></td></tr>
            <tr><td>3</td><td><strong>Song Title 3</strong></td><td class="chart-links"><a href="#">PDF</a> | <a href="#">OnSong</a></td></tr>
            </tbody>
    </table>
</div>

<footer>
    <p style="text-align: center; margin-top: 40px; font-size: 0.8em; color: #666;">
        &copy; 2026 The Imposters | NCC Staff Band
    </p>
</footer>

</body>
</html>
